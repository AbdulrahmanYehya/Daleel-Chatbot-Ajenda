<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ajenda Assistant - Daleel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="chat">
    <h2>Ajenda Assistant - Daleel</h2>
    <div id="messages" dir="auto"></div>
    <div id="inputRow">
      <input id="msg" placeholder="Type a message or command..." />
      <button id="send">Send</button>
    </div>
    <div style="margin-top:12px;">
      <button id="record">Record Voice</button>
      <input type="file" id="imgfile" accept="image/*" />
      <button id="sendImg">Send Image</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
