<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Intelligent Productivity AI | مساعد الإنتاجية الذكي</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="competition-header">
            <div class="header-content">
                <div class="header-main">
                    <h1>🚀 Intelligent Productivity AI</h1>
                    <p class="subtitle">مساعد الإنتاجية الذكي</p>
                </div>
                <div class="header-controls">
                    <div class="model-status">
                        <span id="modelStatus">Checking AI model...</span>
                        <div class="status-indicator" id="statusIndicator"></div>
                    </div>
                    <div class="language-toggle">
                        <button id="arabicBtn" class="lang-btn" onclick="setLanguage('ar')">العربية</button>
                        <button id="englishBtn" class="lang-btn active" onclick="setLanguage('en')">English</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chat Section -->
            <div class="chat-section">
                <div class="chat-container" id="chatContainer">
                    <div class="welcome-message" id="welcomeMessage">
                        <!-- Welcome message will be loaded here -->
                    </div>
                </div>

                <!-- Thinking Indicator -->
                <div class="thinking-indicator" id="thinkingIndicator" style="display: none;">
                    <div class="thinking-dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <span class="thinking-text" id="thinkingText">Thinking...</span>
                </div>

                <!-- Confirmation Banner -->
                <div class="confirmation-banner" id="confirmationBanner" style="display: none;">
                    <div class="confirmation-content">
                        <h3 id="confirmationTitle">Save Research as Note?</h3>
                        <div class="research-preview" id="researchPreview"></div>
                        <div class="confirmation-buttons">
                            <button onclick="confirmResearch(true)" id="confirmYes" class="btn-confirm">Yes, Save</button>
                            <button onclick="confirmResearch(false)" id="confirmNo" class="btn-cancel">No, Thanks</button>
                        </div>
                    </div>
                </div>

                <!-- Examples Section -->
                <div class="examples-section">
                    <div class="examples-header">
                        <h3 id="examplesTitle">Try These Examples</h3>
                        <button class="refresh-examples" onclick="refreshExamples()">🔄</button>
                    </div>
                    <div class="examples-grid" id="examplesGrid">
                        <!-- Examples will be loaded here -->
                    </div>
                </div>

                <!-- Input Section -->
                <div class="input-section">
                    <div class="input-container">
                        <input type="text" id="messageInput" 
                               placeholder="Describe what you want to accomplish..." 
                               onkeypress="handleKeyPress(event)">
                        <div class="voice-controls">
                            <button id="voiceButton" class="btn-voice" onclick="toggleVoiceRecognition()">
                                <span id="voiceIcon">🎤</span>
                            </button>
                            <button id="speakButton" class="btn-speak" onclick="speakLastMessage()" style="display: none;">
                                <span>🔊</span>
                            </button>
                        </div>
                        <button onclick="sendMessage()" id="sendButton" class="btn-send">
                            <span id="sendText">Send to AI</span>
                            <div class="send-loader" id="sendLoader" style="display: none;"></div>
                        </button>
                    </div>
                    <div class="voice-status" id="voiceStatus" style="display: none;">
                        <div class="voice-indicator">
                            <div class="voice-dot"></div>
                            <div class="voice-dot"></div>
                            <div class="voice-dot"></div>
                        </div>
                        <span id="voiceStatusText">Listening...</span>
                    </div>
                </div>
            </div>

            <!-- Content Panels -->
            <div class="content-panels">
                <!-- Tasks Panel -->
                <div class="panel tasks-panel">
                    <div class="panel-header">
                        <h2 id="tasksTitle">🎯 Your Tasks</h2>
                        <div class="panel-stats">
                            <span class="stat" id="tasksCount">0</span>
                            <span class="stat-label">Tasks</span>
                        </div>
                    </div>
                    <div class="panel-content">
                        <div class="tasks-container" id="tasksContainer">
                            <!-- Tasks will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Notes Panel -->
                <div class="panel notes-panel">
                    <div class="panel-header">
                        <h2 id="notesTitle">📚 Knowledge Base</h2>
                        <div class="panel-stats">
                            <span class="stat" id="notesCount">0</span>
                            <span class="stat-label">Notes</span>
                        </div>
                    </div>
                    <div class="panel-content">
                        <div class="notes-container" id="notesContainer">
                            <!-- Notes will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="competition-footer">
            <div class="footer-content">
                <div class="analytics">
                    <div class="analytics-item">
                        <span class="analytics-value" id="totalTasks">0</span>
                        <span class="analytics-label">Total Tasks</span>
                    </div>
                    <div class="analytics-item">
                        <span class="analytics-value" id="totalNotes">0</span>
                        <span class="analytics-label">Total Notes</span>
                    </div>
                    <div class="analytics-item">
                        <span class="analytics-value" id="completedTasks">0</span>
                        <span class="analytics-label">Completed</span>
                    </div>
                </div>
                <button onclick="clearAll()" class="btn-clear" id="clearButton">Clear All Data</button>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
