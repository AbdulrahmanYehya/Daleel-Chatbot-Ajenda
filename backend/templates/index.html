<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daleel Agenda</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="logo-area">
                    <h1>DALEEL AGENDA</h1>
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="modelStatus" class="status-text">Connecting...</span>
                </div>
                <div class="language-controls">
                    <button id="englishBtn" class="lang-btn active" onclick="setLanguage('en')">EN</button>
                    <button id="arabicBtn" class="lang-btn" onclick="setLanguage('ar')">عربي</button>
                </div>
            </div>

            <div class="analytics-bar">
                <div class="stat-item">
                    <span class="stat-label">Tasks</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Notes</span>
                    <span class="stat-value" id="totalNotes">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <button id="clearButton" onclick="clearAll()" class="clear-btn">Clear Data</button>
            </div>
        </header>

        <main class="main-grid">
            
            <section class="interaction-panel">
                <div id="chatContainer" class="chat-container">
                    <div class="message bot-message">
                        <span id="welcomeMessage">Welcome back! How can I help you organize today?</span>
                    </div>
                </div>

                <div id="thinkingIndicator" class="thinking-indicator" style="display: none;">
                    <div class="spinner"></div>
                    <span id="thinkingText">Processing...</span>
                </div>

                <div class="suggestions-section">
                    <h4 id="examplesTitle">Try These Examples</h4>
                    <div id="examplesGrid" class="examples-grid">
                        </div>
                </div>

                <div class="input-wrapper">
                    <div id="voiceStatus" class="voice-status" style="display: none;">
                        <span id="voiceStatusText">Listening...</span>
                    </div>

                    <div class="input-actions-bar">
                        <label for="fileInput" class="icon-btn" title="Upload Document">
                            📂
                            <input type="file" id="fileInput" hidden>
                        </label>
                        <button id="voiceButton" class="icon-btn" onclick="toggleVoiceRecognition()">
                            🎙️
                        </button>
                    </div>

                    <div class="text-input-container">
                        <input type="text" id="messageInput" placeholder="Type a task, note, or query..." autocomplete="off" onkeypress="handleKeyPress(event)">
                        <button id="sendButton" onclick="sendMessage()">
                            <span id="sendText">Send</span>
                            <span id="sendLoader" class="loader" style="display: none;"></span>
                        </button>
                    </div>
                </div>
            </section>

            <section class="data-panel">
                
                <div class="panel-section">
                    <div class="section-header">
                        <h2 id="tasksTitle">Tasks</h2>
                        <span class="count-badge" id="tasksCount">0</span>
                    </div>
                    <div id="tasksContainer" class="items-container">
                        </div>
                </div>

                <div class="panel-section">
                    <div class="section-header">
                        <h2 id="notesTitle">Notes</h2>
                        <span class="count-badge" id="notesCount">0</span>
                    </div>
                    <div id="notesContainer" class="items-container">
                        </div>
                </div>

            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
